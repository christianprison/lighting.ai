name: Auto Merge Into Main

on:
  push:
    branches:
      - claude/db-pflege-app-lyrics-drag-0b8up

jobs:
  merge:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure git
        run: |
          git config --global user.email 'actions@github.com'
          git config --global user.name 'GitHub Action'

      - name: Fetch main branch
        run: git fetch origin main

      - name: Merge changes
        run: |
          git checkout main
          git merge origin/claude/db-pflege-app-lyrics-drag-0b8up --allow-unrelated-histories -m "Automated merge from claude/db-pflege-app-lyrics-drag-0b8up"

      - name: Push changes to main
        run: git push origin main

      - name: Delete branch
        run: git push origin --delete claude/db-pflege-app-lyrics-drag-0b8up
