<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>lighting.ai — Live</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#08090d;--bg2:#0e1017;--bg3:#151820;--bg4:#1c1f2b;
--border:#1e2230;--border2:#2a2e40;
--t1:#eef0f6;--t2:#a0a4b8;--t3:#5c6080;--t4:#363a52;
--green:#00dc82;--green2:#00dc8230;--green3:#00dc8212;
--red:#ff3b5c;--red2:#ff3b5c28;
--amber:#f0a030;--amber2:#f0a03025;
--cyan:#38bdf8;--cyan2:#38bdf825;
--r:8px}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--t1);
font-family:'Sora',system-ui,sans-serif;font-size:14px;-webkit-user-select:none;user-select:none}

/* ═══ LAYOUT ═══ */
.app{display:grid;grid-template-rows:1fr auto;height:100vh;height:100dvh}
.main{display:grid;grid-template-columns:250px 1fr 200px;min-height:0;border-bottom:1px solid var(--border)}
.panel{display:flex;flex-direction:column;min-height:0;background:var(--bg);border-right:1px solid var(--border)}
.panel:last-child{border-right:none;border-left:1px solid var(--border)}
.panel-head{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0;
font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}
.panel-head .ind{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}

/* ═══ SETLIST (LEFT) ═══ */
.song{display:grid;grid-template-columns:22px 1fr auto;align-items:center;gap:8px;
padding:9px 10px;margin-bottom:2px;border-radius:6px;border:1.5px solid transparent;cursor:pointer;transition:all .1s}
.song:active{transform:scale(.97)}
.song.active{background:var(--green3);border-color:var(--green)}
.song.played{opacity:.3}
.song.no-chaser{opacity:.5}
.song-i{font-family:'DM Mono',monospace;font-size:10px;color:var(--t4);text-align:right}
.song.active .song-i{color:var(--green)}
.song-t{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-b{font-family:'DM Mono',monospace;font-size:10px;color:var(--t4)}
.song-pause{height:12px;margin:4px 16px;border-bottom:1px dashed var(--border2)}

/* ═══ CENTER COLUMN ═══ */
.center{display:flex;flex-direction:column;min-height:0;background:var(--bg);border-right:1px solid var(--border)}
.song-bar{flex-shrink:0;padding:14px 20px 12px;text-align:center;border-bottom:1px solid var(--border);
background:linear-gradient(180deg,var(--bg2),var(--bg))}
.song-bar h1{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:2px}
.song-bar .artist{font-size:12px;color:var(--t3);margin-bottom:5px}
.song-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);display:flex;justify-content:center;gap:18px}
.song-meta .v{color:var(--t1);font-weight:500}

/* Parts list in center */
.parts-scroll{flex:1;overflow-y:auto;padding:8px 12px;scrollbar-width:none}
.parts-scroll::-webkit-scrollbar{display:none}

.step{display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:10px;
padding:10px 12px;margin-bottom:3px;border-radius:var(--r);background:var(--bg2);border:1.5px solid transparent;
cursor:pointer;transition:all .1s;position:relative;overflow:hidden}
.step:active{transform:scale(.97)}
.step.done{opacity:.35}
.step.active{background:var(--green3);border-color:var(--green);box-shadow:0 0 24px #00dc8210}
.step.next{background:var(--bg3);border-color:var(--border2)}
.step.title{opacity:.3;padding:6px 12px}
.step-n{font-family:'DM Mono',monospace;font-size:10px;color:var(--t4);text-align:right}
.step.active .step-n{color:var(--green)}
.step-body{display:flex;flex-direction:column;gap:2px;overflow:hidden}
.step-name{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.step-func{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);white-space:nowrap}
.step.active .step-func{color:var(--green)}
.step-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);
background:var(--bg);padding:2px 8px;border-radius:4px;white-space:nowrap;align-self:center}
.step.active .step-badge{color:var(--green);background:#00dc820d}
.step-prog{position:absolute;bottom:0;left:0;height:2.5px;background:var(--green);transition:width .3s;box-shadow:0 0 8px var(--green)}

/* Navigation row */
.nav-area{flex-shrink:0;padding:10px 12px;display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--border)}
.navrow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.nbtn{display:flex;align-items:center;justify-content:center;gap:6px;padding:16px;border-radius:var(--r);
border:1.5px solid var(--border2);background:var(--bg3);color:var(--t1);font-size:14px;font-weight:600;
cursor:pointer;transition:all .1s;touch-action:manipulation}
.nbtn:active{transform:scale(.96)}
.nbtn.go{background:var(--green3);border-color:var(--green);color:var(--green)}
.nbtn.go:active{background:var(--green2)}

/* Beat area */
.beat-area{display:flex;align-items:center;justify-content:center;gap:12px;flex-shrink:0;padding:6px 0}
.tap-btn{width:56px;height:56px;border-radius:50%;background:var(--bg3);border:3px solid var(--border2);
cursor:pointer;transition:all 70ms;display:flex;align-items:center;justify-content:center;
font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--t3);position:relative;z-index:1;
flex-shrink:0;touch-action:manipulation}
.tap-btn:active{transform:scale(.92)}
.tap-btn.on{background:var(--green);border-color:var(--green);color:var(--bg);
box-shadow:0 0 28px #00dc8270,0 0 60px #00dc8225;font-weight:700}
.tap-btn .tap-label{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);
font-size:7px;letter-spacing:1.5px;color:var(--t4);white-space:nowrap}
.tap-btn.on .tap-label{color:var(--green)}
@keyframes tapFlash{0%{box-shadow:0 0 40px #00dc8290,0 0 80px #00dc8240}100%{box-shadow:0 0 28px #00dc8270,0 0 60px #00dc8225}}
.tap-btn.flash{animation:tapFlash .15s ease}
.bpm-box{font-family:'DM Mono',monospace;text-align:center;line-height:1.1;flex-shrink:0}
.bpm-num{font-size:30px;font-weight:500;color:var(--t1)}
.bpm-label{font-size:9px;color:var(--t3);letter-spacing:2px}

/* ═══ RIGHT PANEL: ACCENTS + STATUS ═══ */
.accent-scroll{flex:1;padding:8px;display:flex;flex-direction:column;gap:8px}
.abtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
padding:16px 8px;border-radius:var(--r);
border:1.5px solid var(--border2);background:var(--bg3);font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
letter-spacing:.8px;text-transform:uppercase;color:var(--t2);cursor:pointer;transition:all .1s;touch-action:manipulation}
.abtn:active{transform:scale(.93)}
.abtn .ico{font-size:22px;line-height:1}
.abtn.r{color:var(--red);border-color:var(--red2)}
.abtn.r:active,.abtn.r.on{background:var(--red2);border-color:var(--red);box-shadow:0 0 20px #ff3b5c18}
.abtn.a{color:var(--amber);border-color:var(--amber2)}
.abtn.a:active,.abtn.a.on{background:var(--amber2);border-color:var(--amber)}
.abtn.c{color:var(--cyan);border-color:var(--cyan2)}
.abtn.c:active,.abtn.c.on{background:var(--cyan2);border-color:var(--cyan)}

.divider{height:1px;background:var(--border);margin:4px 0}

/* Status section */
.status-section{flex-shrink:0;padding:10px 12px;border-top:1px solid var(--border)}
.status-row{display:flex;align-items:center;gap:6px;padding:4px 0;font-family:'DM Mono',monospace;font-size:10px;color:var(--t3)}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.warn{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.status-dot.err{background:var(--red);box-shadow:0 0 6px var(--red)}
.sync-btn{margin-top:8px;width:100%;padding:8px;border-radius:var(--r);border:1px solid var(--border2);
background:var(--bg3);color:var(--t2);font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .1s}
.sync-btn:active{transform:scale(.96);background:var(--bg4)}

/* ═══ STATUS BAR (BOTTOM) ═══ */
.statusbar{background:var(--bg2);padding:6px 16px;display:flex;align-items:center;justify-content:space-between;
border-top:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;color:var(--t3)}
.statusbar .badges{display:flex;gap:8px}
.badge{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;letter-spacing:1.5px;
padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px}
.badge.live{background:var(--green2);color:var(--green);border:1px solid var(--green)}
.badge.qlc{background:var(--cyan2);color:var(--cyan);border:1px solid #38bdf850}
.badge.off{background:var(--bg3);color:var(--t4);border:1px solid var(--border)}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ═══ CONNECTION OVERLAY ═══ */
.conn-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(8,9,13,.9);
display:none;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:12px}
.conn-overlay.show{display:flex}
.conn-msg{font-family:'DM Mono',monospace;font-size:14px;color:var(--t2)}
.conn-dot{width:10px;height:10px;border-radius:50%;background:var(--amber);animation:pulse 1s infinite}
</style>
</head>
<body>
<div class="conn-overlay" id="connOverlay">
  <div class="conn-dot"></div>
  <div class="conn-msg">Verbinde mit Server...</div>
</div>

<div class="app">
<div class="main">
<!-- LEFT: SETLIST -->
<div class="panel">
  <div class="panel-head"><div class="ind"></div>SETLIST</div>
  <div class="scroll" id="setlist"></div>
</div>

<!-- CENTER: CURRENT SONG -->
<div class="center">
  <div class="song-bar">
    <h1 id="songTitle">-</h1>
    <div class="artist" id="songArtist"></div>
    <div class="song-meta">
      <span>BPM <span class="v" id="metaBpm">-</span></span>
      <span>STEP <span class="v" id="metaStep">-</span>/<span class="v" id="metaTotal">-</span></span>
    </div>
  </div>
  <div class="parts-scroll" id="steps"></div>
  <div class="nav-area">
    <div class="beat-area">
      <div class="tap-btn" id="tap">TAP<span class="tap-label">TEMPO</span></div>
      <div class="bpm-box"><div class="bpm-num" id="bpmDisp">-</div><div class="bpm-label">BPM</div></div>
    </div>
    <div class="navrow">
      <button class="nbtn" id="btnPrev">&#x25C0; PREV</button>
      <button class="nbtn go" id="btnNext">NEXT &#x25B6;</button>
    </div>
  </div>
</div>

<!-- RIGHT: ACCENTS + STATUS -->
<div class="panel" style="border-right:none">
  <div class="panel-head">ACCENTS</div>
  <div class="accent-scroll">
    <button class="abtn a" data-accent="blind"><span class="ico">&#x1F4A5;</span>BLINDER</button>
    <button class="abtn c" data-accent="strobe"><span class="ico">&#x26A1;</span>STROBE</button>
    <button class="abtn c" data-accent="fog_5s"><span class="ico">&#x2601;</span>FOG 5s</button>
    <button class="abtn c" data-accent="fog_10s"><span class="ico">&#x2601;</span>FOG 10s</button>
    <button class="abtn r" data-accent="blackout"><span class="ico">&#x25A0;</span>BLACKOUT</button>
    <div class="divider"></div>
    <button class="abtn a" data-accent="alarm"><span class="ico">&#x1F514;</span>ALARM</button>
  </div>
  <div class="status-section">
    <div class="status-row"><div class="status-dot" id="dotQlc"></div><span id="statusQlc">QLC+ —</span></div>
    <div class="status-row"><div class="status-dot" id="dotSync"></div><span id="statusSync">DB —</span></div>
    <button class="sync-btn" id="btnSync">SYNC</button>
  </div>
</div>
</div>

<!-- BOTTOM STATUS BAR -->
<div class="statusbar">
  <div class="badges">
    <div class="badge live" id="badgeLive"><div class="pulse"></div>LIVE</div>
    <div class="badge" id="badgeQlc">QLC+ &#x25CF;</div>
  </div>
  <span id="wsStatus">WS: Verbinde...</span>
</div>
</div>

<script>
// ═══════════════════════════════════════════
// lighting.ai Live Controller UI
// ═══════════════════════════════════════════

var state = {};        // Live state from server
var setlist = [];      // Setlist items
var songs = {};        // All songs
var qlcMapping = {};   // song_id -> chaser data
var ws = null;
var wsReady = false;
var reconnTimer = null;

// ─── WebSocket ───────────────────────────
function connectWS() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var url = proto + '//' + location.host + '/ws';
  ws = new WebSocket(url);
  ws.onopen = function() {
    wsReady = true;
    document.getElementById('connOverlay').classList.remove('show');
    document.getElementById('wsStatus').textContent = 'WS: Verbunden';
    if (reconnTimer) { clearTimeout(reconnTimer); reconnTimer = null; }
  };
  ws.onmessage = function(e) {
    var msg = JSON.parse(e.data);
    if (msg.type === 'state') {
      state = msg.data;
      renderState();
    }
  };
  ws.onclose = function() {
    wsReady = false;
    document.getElementById('wsStatus').textContent = 'WS: Getrennt';
    document.getElementById('connOverlay').classList.add('show');
    reconnTimer = setTimeout(connectWS, 2000);
  };
  ws.onerror = function() { ws.close(); };
}

function sendCmd(action, params) {
  if (!ws || !wsReady) return;
  var msg = Object.assign({ action: action }, params || {});
  ws.send(JSON.stringify(msg));
}

// ─── REST API ────────────────────────────
function fetchJSON(url) {
  return fetch(url).then(function(r) { return r.json(); });
}

async function loadInitialData() {
  try {
    var [songsData, setlistData, qlcData] = await Promise.all([
      fetchJSON('/api/songs'),
      fetchJSON('/api/setlist'),
      fetchJSON('/api/qlc/mapping'),
    ]);
    songs = songsData;
    setlist = setlistData.items || [];
    qlcMapping = qlcData.song_mapping || {};
    renderSetlist();
  } catch (e) {
    console.error('Failed to load initial data:', e);
  }
}

// ─── Render: Setlist ─────────────────────
function renderSetlist() {
  var el = document.getElementById('setlist');
  var h = '';
  var idx = 0;
  for (var i = 0; i < setlist.length; i++) {
    var item = setlist[i];
    if (item.type === 'pause') {
      h += '<div class="song-pause"></div>';
      continue;
    }
    idx++;
    var sid = item.song_id;
    var isActive = state.current_song_id === sid;
    var hasChaser = !!qlcMapping[sid];
    var cls = isActive ? 'active' : '';
    if (!hasChaser) cls += ' no-chaser';
    h += '<div class="song ' + cls + '" data-sid="' + sid + '">';
    h += '<span class="song-i">' + String(idx).padStart(2, '0') + '</span>';
    h += '<span class="song-t">' + (item.name || '?') + '</span>';
    h += '<span class="song-b">' + (item.bpm || '') + '</span>';
    h += '</div>';
  }
  el.innerHTML = h;
  // Scroll active into view
  var active = el.querySelector('.song.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ─── Render: Steps (center) ──────────────
function renderSteps() {
  var el = document.getElementById('steps');
  var sid = state.current_song_id;
  if (!sid || !qlcMapping[sid]) {
    el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--t3)">Kein Song ausgew&auml;hlt</div>';
    return;
  }
  var chaser = qlcMapping[sid];
  var steps = chaser.steps || [];
  var curStep = state.current_step || 0;
  var h = '';
  for (var i = 0; i < steps.length; i++) {
    var s = steps[i];
    var cls = '';
    if (s.is_title) cls = 'title';
    else if (i < curStep) cls = 'done';
    else if (i === curStep) cls = 'active';
    else if (i === curStep + 1) cls = 'next';

    var holdLabel = '';
    if (s.is_manual) holdLabel = 'MANUAL';
    else if (s.hold_sec !== null) holdLabel = s.hold_sec + 's';

    var funcName = s.function_name || '';
    var note = s.note || '';

    h += '<div class="step ' + cls + '" data-step="' + i + '">';
    h += '<span class="step-n">' + (i + 1) + '</span>';
    h += '<div class="step-body">';
    h += '<span class="step-name">' + escHtml(note || funcName || '—') + '</span>';
    if (funcName && note) h += '<span class="step-func">' + escHtml(funcName) + '</span>';
    h += '</div>';
    h += '<span class="step-badge">' + holdLabel + '</span>';
    h += '</div>';
  }
  el.innerHTML = h;
  // Scroll active step into view
  var activeStep = el.querySelector('.step.active');
  if (activeStep) activeStep.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ─── Render: State (full update) ─────────
function renderState() {
  // Song header
  document.getElementById('songTitle').textContent = state.current_song_name || '-';
  document.getElementById('songArtist').textContent = state.current_artist || '';
  document.getElementById('metaBpm').textContent = state.current_bpm || '-';
  document.getElementById('metaStep').textContent = state.current_step != null ? state.current_step + 1 : '-';
  document.getElementById('metaTotal').textContent = state.total_steps || '-';
  document.getElementById('bpmDisp').textContent = state.current_bpm || '-';

  // QLC+ status
  var dotQlc = document.getElementById('dotQlc');
  var statusQlc = document.getElementById('statusQlc');
  var badgeQlc = document.getElementById('badgeQlc');
  if (state.qlc_connected) {
    dotQlc.className = 'status-dot ok';
    statusQlc.textContent = 'QLC+ Verbunden';
    badgeQlc.className = 'badge qlc';
  } else {
    dotQlc.className = 'status-dot err';
    statusQlc.textContent = 'QLC+ Getrennt';
    badgeQlc.className = 'badge off';
  }

  // DB sync status
  var dotSync = document.getElementById('dotSync');
  var statusSync = document.getElementById('statusSync');
  if (state.db_synced) {
    dotSync.className = 'status-dot ok';
    var timeStr = state.db_sync_time ? formatSyncTime(state.db_sync_time) : '';
    statusSync.textContent = 'DB Aktuell' + (timeStr ? ' (' + timeStr + ')' : '') +
      (state.db_sync_method ? ' [' + state.db_sync_method + ']' : '');
  } else {
    dotSync.className = 'status-dot warn';
    statusSync.textContent = 'DB Offline';
  }

  // Setlist + Steps
  renderSetlist();
  renderSteps();
}

// ─── Helpers ─────────────────────────────
function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatSyncTime(iso) {
  try {
    var d = new Date(iso);
    var now = new Date();
    var diffMin = Math.round((now - d) / 60000);
    if (diffMin < 1) return 'gerade eben';
    if (diffMin < 60) return 'vor ' + diffMin + 'min';
    var diffH = Math.round(diffMin / 60);
    if (diffH < 24) return 'vor ' + diffH + 'h';
    return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
  } catch (e) { return ''; }
}

// ─── Event handlers ──────────────────────

// Setlist: click song
document.getElementById('setlist').addEventListener('click', function(e) {
  var songEl = e.target.closest('.song');
  if (!songEl) return;
  var sid = songEl.dataset.sid;
  if (sid) sendCmd('select_song', { song_id: sid });
});

// Steps: click step
document.getElementById('steps').addEventListener('click', function(e) {
  var stepEl = e.target.closest('.step');
  if (!stepEl) return;
  var idx = parseInt(stepEl.dataset.step, 10);
  if (!isNaN(idx)) sendCmd('goto', { step: idx });
});

// Nav buttons
document.getElementById('btnNext').addEventListener('click', function() { sendCmd('next'); });
document.getElementById('btnPrev').addEventListener('click', function() { sendCmd('prev'); });

// Accent buttons
document.querySelectorAll('.abtn[data-accent]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var type = this.dataset.accent;
    sendCmd('accent', { type: type });
    // Visual flash feedback
    this.classList.add('on');
    var self = this;
    setTimeout(function() { self.classList.remove('on'); }, 300);
  });
});

// Tap tempo
var tapTimes = [];
var tapEl = document.getElementById('tap');
function onTap() {
  var now = performance.now();
  tapTimes.push(now);
  if (tapTimes.length > 8) tapTimes.shift();
  // Flash
  tapEl.classList.add('on');
  tapEl.classList.remove('flash');
  tapEl.offsetWidth;
  tapEl.classList.add('flash');
  setTimeout(function() { tapEl.classList.remove('on'); }, 150);
  // Send tap to server
  sendCmd('tap');
}
tapEl.addEventListener('touchstart', function(e) { e.preventDefault(); onTap(); }, { passive: false });
tapEl.addEventListener('mousedown', function(e) { e.preventDefault(); onTap(); });

// Sync button
document.getElementById('btnSync').addEventListener('click', async function() {
  this.textContent = 'SYNCING...';
  try {
    var result = await fetch('/api/sync', { method: 'POST' }).then(function(r) { return r.json(); });
    this.textContent = result.ok ? 'SYNC OK' : 'SYNC FAILED';
    // Reload data after sync
    await loadInitialData();
    renderState();
  } catch (e) {
    this.textContent = 'SYNC ERROR';
  }
  var self = this;
  setTimeout(function() { self.textContent = 'SYNC'; }, 3000);
});

// ─── Init ────────────────────────────────
document.getElementById('connOverlay').classList.add('show');
loadInitialData().then(function() {
  connectWS();
});
</script>
</body>
</html>
