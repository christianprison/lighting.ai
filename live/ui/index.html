<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>lighting.ai</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#08090d;--bg2:#0e1017;--bg3:#151820;--bg4:#1c1f2b;
--border:#1e2230;--border2:#2a2e40;
--t1:#eef0f6;--t2:#a0a4b8;--t3:#5c6080;--t4:#363a52;
--green:#00dc82;--green2:#00dc8230;--green3:#00dc8212;
--red:#ff3b5c;--red2:#ff3b5c28;
--amber:#f0a030;--amber2:#f0a03025;
--cyan:#38bdf8;--cyan2:#38bdf825;
--r:8px}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--t1);
font-family:'Sora',system-ui,sans-serif;font-size:14px;-webkit-user-select:none;user-select:none}

.app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
.main{flex:1 1 0;min-height:0;display:flex;flex-direction:row;overflow:hidden;border-bottom:1px solid var(--border)}
.panel{flex:0 0 240px;display:flex;flex-direction:column;min-height:0;overflow:hidden;background:var(--bg);border-right:1px solid var(--border)}
.panel:last-child{flex:0 0 220px;border-right:none;border-left:1px solid var(--border)}
.panel-head{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0;
font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}
.panel-head .ind{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}

/* ═══ PARTS (LEFT) ═══ */
.part{display:grid;grid-template-columns:22px 1fr auto;align-items:center;gap:8px;
padding:0 12px;margin-bottom:3px;border-radius:var(--r);background:var(--bg2);border:1.5px solid transparent;
cursor:pointer;transition:all .1s;position:relative;overflow:hidden}
.part:active{transform:scale(.97)}
.part.done{opacity:.35}
.part.active{background:var(--green3);border-color:var(--green);box-shadow:0 0 24px #00dc8210}
.part.next{background:var(--bg3);border-color:var(--border2)}
.part-n{font-family:'DM Mono',monospace;font-size:10px;color:var(--t4);text-align:right}
.part.active .part-n{color:var(--green)}
.part-body{display:flex;flex-direction:column;justify-content:center;gap:2px;overflow:hidden}
.part-name{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.part-info{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);white-space:nowrap}
.part.active .part-info{color:var(--green)}
.part-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);
background:var(--bg);padding:2px 8px;border-radius:4px;white-space:nowrap;align-self:center}
.part.active .part-badge{color:var(--green);background:#00dc820d}
.part-prog{position:absolute;bottom:0;left:0;height:2.5px;background:var(--green);transition:width .3s;box-shadow:0 0 8px var(--green)}

/* ═══ CENTER ═══ */
.center{flex:1 1 0;min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden;
background:var(--bg);border-right:1px solid var(--border)}
.song-bar{flex-shrink:0;padding:10px 20px 8px;text-align:center;border-bottom:1px solid var(--border);
background:linear-gradient(180deg,var(--bg2),var(--bg))}
.song-bar h1{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:2px;
overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.song-bar .artist{font-size:12px;color:var(--t3);margin-bottom:5px}
.song-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);display:flex;justify-content:center;gap:18px}
.song-meta .v{color:var(--t1);font-weight:500}
.ctrls{flex:1;display:flex;flex-direction:column;padding:8px 18px;gap:10px;min-height:0;overflow:hidden}
.badges{display:flex;justify-content:center;gap:8px;flex-shrink:0}
.badge{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;letter-spacing:1.5px;padding:4px 11px;border-radius:20px;display:flex;align-items:center;gap:5px}
.badge.live{background:var(--green2);color:var(--green);border:1px solid var(--green)}
.badge.qlc{background:var(--cyan2);color:var(--cyan);border:1px solid #38bdf850}
.badge.off{background:var(--bg3);color:var(--t2);border:1px solid var(--border2)}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Beat area */
.beat-area{display:flex;align-items:center;justify-content:center;gap:0;flex-shrink:0}
.beat-row{display:flex;align-items:center;gap:0}
.tap-btn{width:56px;height:56px;border-radius:50%;background:var(--bg3);border:3px solid var(--border2);
cursor:pointer;transition:all 70ms;display:flex;align-items:center;justify-content:center;
font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--t3);position:relative;z-index:1;
flex-shrink:0;touch-action:manipulation}
.tap-btn:active{transform:scale(.92)}
.tap-btn.on{background:var(--green);border-color:var(--green);color:var(--bg);
box-shadow:0 0 28px #00dc8270,0 0 60px #00dc8225;font-weight:700}
.tap-btn .tap-label{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);
font-size:7px;letter-spacing:1.5px;color:var(--t4);white-space:nowrap}
.tap-btn.on .tap-label{color:var(--green)}
@keyframes tapFlash{0%{box-shadow:0 0 40px #00dc8290,0 0 80px #00dc8240}100%{box-shadow:0 0 28px #00dc8270,0 0 60px #00dc8225}}
.tap-btn.flash{animation:tapFlash .15s ease}
.beat-connector{width:14px;height:2px;background:var(--border);flex-shrink:0}
.beat-connector.lit{background:var(--green);box-shadow:0 0 4px var(--green)}
.beat-dots{display:flex;gap:8px;align-items:center}
.bdot{width:24px;height:24px;border-radius:50%;background:var(--bg3);border:2px solid var(--border2);transition:all 70ms;flex-shrink:0}
.bdot.on{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 14px #38bdf860}
.bpm-box{font-family:'DM Mono',monospace;text-align:center;line-height:1.1;margin-left:18px;flex-shrink:0}
.bpm-num{font-size:30px;font-weight:500;color:var(--t1)}
.bpm-label{font-size:9px;color:var(--t3);letter-spacing:2px}

/* Override buttons */
.overrides{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;flex-shrink:0}
.obtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:12px 4px;border-radius:var(--r);
border:1.5px solid var(--border2);background:var(--bg3);font-family:'DM Mono',monospace;font-size:9px;font-weight:500;
letter-spacing:.8px;text-transform:uppercase;color:var(--t2);cursor:pointer;transition:all .1s;touch-action:manipulation}
.obtn:active{transform:scale(.93)}
.obtn .ico{font-size:18px;line-height:1}
.obtn.r{color:var(--red);border-color:var(--red2)}
.obtn.r.on{background:var(--red2);border-color:var(--red);box-shadow:0 0 20px #ff3b5c18}
.obtn.a{color:var(--amber);border-color:var(--amber2)}
.obtn.a.on{background:var(--amber2);border-color:var(--amber)}
.obtn.c{color:var(--cyan);border-color:var(--cyan2)}
.obtn.c.on{background:var(--cyan2);border-color:var(--cyan)}
.obtn.p{color:var(--green);border-color:var(--green2)}
.obtn.p.on{background:var(--green2);border-color:var(--green)}

/* Nav row */
.navrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0;margin-top:auto}

/* Setlist head: REC + Settings */
.setlist-head{display:flex;align-items:center;gap:6px;padding:8px 10px;flex-shrink:0}
.rec-main-btn{flex:1;padding:10px 6px;border-radius:var(--r);border:2px solid var(--border2);
background:var(--bg3);color:var(--t2);font-family:'DM Mono',monospace;font-size:12px;font-weight:600;
letter-spacing:2px;cursor:pointer;transition:all .12s;touch-action:manipulation}
.rec-main-btn:active{transform:scale(.97)}
.rec-main-btn.on{background:#ff3b5c18;border-color:var(--red);color:var(--red)}
.rec-main-btn.armed{background:var(--amber2);border-color:var(--amber);color:var(--amber)}
.nbtn{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;border-radius:var(--r);
border:1.5px solid var(--border2);background:var(--bg3);color:var(--t1);font-size:13px;font-weight:600;
cursor:pointer;transition:all .1s;touch-action:manipulation}
.nbtn:active{transform:scale(.96)}
.nbtn.go{background:var(--green3);border-color:var(--green);color:var(--green)}
.nbtn.go:active{background:var(--green2)}

/* ═══ SETLIST (RIGHT) ═══ */
.song{display:grid;grid-template-columns:22px 1fr auto;align-items:center;gap:8px;
padding:9px 10px;margin-bottom:2px;border-radius:6px;border:1.5px solid transparent;cursor:pointer;transition:all .1s}
.song:active{transform:scale(.97)}
.song.active{background:var(--green3);border-color:var(--green)}
.song.played{opacity:.3}
.song.no-chaser{opacity:.7}
.song-i{font-family:'DM Mono',monospace;font-size:10px;color:var(--t4);text-align:right}
.song.active .song-i{color:var(--green)}
.song-t{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-b{font-family:'DM Mono',monospace;font-size:10px;color:var(--t4)}
.song-pause{height:12px;margin:4px 16px;border-bottom:1px dashed var(--border2)}

/* ═══ TIMELINE (BOTTOM) ═══ */
.timeline{flex-shrink:0;background:var(--bg2);display:grid;
grid-template-columns:110px 1fr 130px;
column-gap:8px;padding:8px 12px calc(8px + env(safe-area-inset-bottom)) 12px;
padding-left:calc(12px + env(safe-area-inset-left));
padding-right:calc(12px + env(safe-area-inset-right));
border-top:1px solid var(--border);align-items:start}
.tl-label{grid-column:1;display:flex;flex-direction:column;gap:1px;padding-top:4px}
.tl-part-name{font-family:'Sora',sans-serif;font-size:14px;font-weight:600;color:var(--green)}
.tl-part-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3)}
.tl-track{grid-column:2;overflow:hidden}
.tl-scroll{overflow-x:auto;overflow-y:hidden;scrollbar-width:none}
.tl-scroll::-webkit-scrollbar{display:none}
.tl-bars{display:flex;gap:2px;height:32px;align-items:stretch}
.tl-bars::-webkit-scrollbar{display:none}
.tl-bar{flex:0 0 100px;border-radius:3px;background:var(--bg3);border:1px solid var(--border);
display:flex;align-items:center;justify-content:center;position:relative;
font-family:'DM Mono',monospace;font-size:9px;color:var(--t4);cursor:pointer;transition:all .12s}
.tl-bar.done{background:var(--bg4);border-color:var(--border2)}
.tl-bar.active{background:var(--green2);border-color:var(--green);box-shadow:0 0 10px #00dc8220;color:var(--green)}
.tl-lyrics{display:flex;gap:2px;margin-top:2px}
.tl-lyric{flex:0 0 100px;font-family:'DM Mono',monospace;font-size:9px;color:var(--t1);
overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-right{grid-column:3;display:flex;flex-direction:column;align-items:flex-end;gap:4px;padding-top:4px}
.tl-status{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);display:flex;align-items:center;gap:6px}
.tl-status .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tl-status .dot.ok{background:var(--green);box-shadow:0 0 4px var(--green)}
.tl-status .dot.err{background:var(--red);box-shadow:0 0 4px var(--red)}
.tl-status .dot.warn{background:var(--amber);box-shadow:0 0 4px var(--amber)}
.tl-sync{font-family:'DM Mono',monospace;font-size:9px;color:var(--t4);cursor:pointer;
padding:2px 8px;border-radius:3px;border:1px solid var(--border);background:transparent;transition:all .1s;margin-top:2px}
.tl-sync:active{background:var(--bg4);color:var(--t2)}

/* ═══ XR18 VU PANEL ═══ */
.vu-panel{position:absolute;bottom:100%;right:0;margin-bottom:6px;
background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);
padding:10px 12px;min-width:260px;display:none;z-index:50;box-shadow:0 -4px 24px rgba(0,0,0,.5)}
.vu-panel.show{display:block}
.vu-head{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;
color:var(--t3);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.vu-device{font-size:9px;color:var(--t4);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vu-channels{display:flex;gap:3px;align-items:flex-end;height:48px}
.vu-ch{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
.vu-bar-wrap{width:100%;flex:1;display:flex;align-items:flex-end;background:var(--bg3);
border-radius:2px;overflow:hidden;min-height:36px;position:relative}
.vu-bar-fill{width:100%;background:var(--cyan);border-radius:2px;transition:height .1s;position:absolute;bottom:0}
.vu-bar-fill.mid{background:var(--amber)}
.vu-bar-fill.low{background:var(--t4)}
.vu-lbl{font-family:'DM Mono',monospace;font-size:7px;color:var(--t4);line-height:1}
.vu-ch.mix .vu-lbl{color:var(--t1);font-weight:500}
.tl-audio-row{cursor:pointer}
.tl-audio-row:active .dot{transform:scale(1.3)}
.dot.audio-ok{background:var(--cyan);box-shadow:0 0 4px var(--cyan)}

/* ═══ MODE TOGGLE ═══ */
.modes{display:flex;gap:3px;margin-left:auto}
.mbtn{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;letter-spacing:1px;
padding:4px 9px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--t4);cursor:pointer;transition:all .1s}
.mbtn.on{background:var(--green3);border-color:var(--green);color:var(--green)}

/* ═══ SETTINGS BUTTON ═══ */
.settings-btn{width:28px;height:28px;border-radius:4px;flex-shrink:0;margin-left:auto;
border:1px solid var(--border2);background:var(--bg3);color:var(--t1);cursor:pointer;transition:all .1s;
display:flex;align-items:center;justify-content:center;font-size:16px}
.settings-btn:hover,.settings-btn:active{border-color:var(--green);color:var(--green);background:var(--green3)}

/* ═══ CONFIG MODAL ═══ */
.cfg-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(8,9,13,.92);
display:none;z-index:200;overflow-y:auto}
.cfg-overlay.show{display:block}
.cfg-modal{max-width:1200px;margin:0 auto;padding:16px}
.cfg-header{display:flex;align-items:center;gap:16px;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:12px}
.cfg-header h2{font-size:18px;font-weight:600;flex:1}
.cfg-close{width:32px;height:32px;border-radius:4px;border:1px solid var(--border2);background:var(--bg3);
color:var(--t2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.cfg-close:hover{border-color:var(--red);color:var(--red)}
.cfg-bar{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:16px}
.cfg-bar label{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);display:flex;align-items:center;gap:6px}
.cfg-bar input{background:var(--bg3);border:1px solid var(--border2);color:var(--t1);padding:5px 10px;border-radius:4px;
font-family:'DM Mono',monospace;font-size:12px;width:120px}
.cfg-bar input[type=number]{width:70px}
.cfg-status{font-family:'DM Mono',monospace;font-size:11px;padding:4px 10px;border-radius:12px;margin-left:auto}
.cfg-status.ok{background:var(--green3);color:var(--green);border:1px solid var(--green)}
.cfg-status.err{background:#ff3b5c15;color:var(--red);border:1px solid var(--red)}
.cfg-info{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);line-height:1.6;margin-bottom:16px}
.cfg-group{margin-bottom:20px}
.cfg-group-title{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;
color:var(--t3);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.cfg-btns{display:flex;flex-wrap:wrap;gap:6px}
.cfg-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
width:110px;height:70px;border-radius:var(--r);border:1.5px solid var(--border2);background:var(--bg3);
cursor:pointer;transition:all .12s;position:relative;overflow:hidden}
.cfg-btn:hover{border-color:var(--t3);background:var(--bg4)}
.cfg-btn:active{transform:scale(.95)}
.cfg-btn.flash{border-color:var(--green);background:var(--green3);box-shadow:0 0 20px #00dc8220}
.cfg-btn .lbl{font-size:10px;font-weight:500;text-align:center;padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.cfg-btn .ch{font-family:'DM Mono',monospace;font-size:9px;color:var(--t4)}
.cfg-btn.flash .ch{color:var(--green)}

/* ═══ CONNECTION / WARMUP OVERLAY ═══ */
.conn-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(8,9,13,.85);
display:none;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:16px;
transition:opacity .4s}
.conn-overlay.show{display:flex}
.conn-overlay.fade{opacity:0}
.conn-title{font-family:'Sora',sans-serif;font-size:18px;font-weight:600;color:var(--t1);letter-spacing:-.3px}
.conn-tasks{display:flex;flex-direction:column;gap:6px;min-width:260px}
.conn-task{display:flex;align-items:center;gap:10px;font-family:'DM Mono',monospace;font-size:12px;color:var(--t3);transition:color .2s}
.conn-task.active{color:var(--t2)}
.conn-task.done{color:var(--green)}
.conn-task.err{color:var(--red)}
.conn-task .ct-icon{width:16px;text-align:center;flex-shrink:0;font-size:10px}
.conn-task.active .ct-icon{color:var(--amber);animation:pulse 1s infinite}
.conn-task.done .ct-icon{color:var(--green)}
.conn-task.err .ct-icon{color:var(--red)}

/* ═══ RECORDING ═══ */
.tl-rec{font-family:'DM Mono',monospace;font-size:9px;color:var(--t4);cursor:pointer;
padding:2px 8px;border-radius:3px;border:1px solid var(--border);background:transparent;transition:all .1s;margin-top:2px;
-webkit-user-select:none;user-select:none}
.tl-rec:active{background:var(--bg4)}
.tl-rec.on{color:var(--red);border-color:var(--red);background:#ff3b5c12;font-weight:500}
.tl-rec.armed{color:var(--amber);border-color:var(--amber);background:var(--amber2)}
.tl-rec-dur{font-family:'DM Mono',monospace;font-size:9px;color:var(--red);margin-top:2px;
min-width:32px;text-align:right;display:none}
.tl-rec-dur.show{display:block}

.rec-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(8,9,13,.92);
display:none;z-index:200;overflow-y:auto}
.rec-overlay.show{display:block}
.rec-modal{max-width:600px;margin:0 auto;padding:16px}
.rec-header{display:flex;align-items:center;gap:16px;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:16px}
.rec-header h2{font-size:18px;font-weight:600;flex:1}
.rec-close{width:32px;height:32px;border-radius:4px;border:1px solid var(--border2);background:var(--bg3);
color:var(--t2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.rec-close:hover{border-color:var(--red);color:var(--red)}

.rec-ctrl{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.rec-start-btn{padding:10px 24px;border-radius:var(--r);border:1.5px solid var(--green);background:var(--green3);
color:var(--green);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:1px;
cursor:pointer;transition:all .12s}
.rec-start-btn:active{transform:scale(.95)}
.rec-start-btn.on{background:var(--red2);border-color:var(--red);color:var(--red)}
.rec-dur{font-family:'DM Mono',monospace;font-size:13px;color:var(--t1)}
.rec-label-hint{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3)}

.rec-list-head{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;
color:var(--t3);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.rec-item{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:12px;
padding:10px 12px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);margin-bottom:4px}
.rec-item-name{font-family:'DM Mono',monospace;font-size:11px;color:var(--t1);
overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec-item-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--t4);white-space:nowrap}
.rec-mix-btn{padding:5px 12px;border-radius:4px;border:1px solid var(--cyan2);background:transparent;
color:var(--cyan);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;transition:all .12s;white-space:nowrap}
.rec-mix-btn:active{background:var(--cyan2)}
.rec-mix-btn:disabled{opacity:.4;cursor:default}
.rec-mix-btn.done{border-color:var(--green);color:var(--green)}
.rec-empty{font-family:'DM Mono',monospace;font-size:11px;color:var(--t4);padding:20px;text-align:center}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--green);
color:var(--green);padding:8px 20px;border-radius:20px;font-family:'DM Mono',monospace;font-size:12px;
opacity:0;transition:opacity .3s;pointer-events:none;z-index:300}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- RECORDING MODAL -->
<div class="rec-overlay" id="recOverlay">
<div class="rec-modal">
  <div class="rec-header">
    <h2>Aufnahme</h2>
    <button class="rec-close" onclick="toggleRecModal()">&times;</button>
  </div>
  <div class="rec-ctrl" style="display:none"></div>
  <div class="rec-list-head">Aufnahmen</div>
  <div id="recList"><div class="rec-empty">Keine Aufnahmen</div></div>
</div>
</div>

<!-- CONFIG MODAL -->
<div class="cfg-overlay" id="cfgOverlay">
<div class="cfg-modal">
  <div class="cfg-header">
    <h2>QLC+ OSC Config</h2>
    <button class="cfg-close" onclick="toggleConfig()">&times;</button>
  </div>
  <div class="cfg-bar">
    <label>Host <input type="text" id="oscHost" value="127.0.0.1"></label>
    <label>Port <input type="number" id="oscPort" value="7700"></label>
    <label>Universe <input type="number" id="oscUni" value="1"></label>
    <div class="cfg-status" id="cfgConnStatus">...</div>
  </div>
  <div class="cfg-info">
    QLC+ &rarr; Button &rarr; External Input &rarr; Auto-Detect &rarr; hier klicken.
  </div>
  <div id="cfgGroups"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<div class="conn-overlay" id="connOverlay">
  <div class="conn-title">lighting.ai</div>
  <div class="conn-tasks" id="connTasks">
    <div class="conn-task" id="ct-songs"><span class="ct-icon">&#x25CB;</span>Songs laden</div>
    <div class="conn-task" id="ct-setlist"><span class="ct-icon">&#x25CB;</span>Setlist laden</div>
    <div class="conn-task" id="ct-qlc"><span class="ct-icon">&#x25CB;</span>QLC+ Mapping</div>
    <div class="conn-task" id="ct-ws"><span class="ct-icon">&#x25CB;</span>WebSocket verbinden</div>
  </div>
</div>

<div class="app">
<div class="main">

<!-- LEFT: PARTS -->
<div class="panel">
  <div class="panel-head"><div class="ind"></div>PARTS
    <div class="modes">
      <button class="mbtn on" onclick="modeSwitch(this)">LIVE</button>
      <button class="mbtn" onclick="modeSwitch(this)">EDIT</button>
    </div>
  </div>
  <div class="scroll" id="parts"></div>
</div>

<!-- CENTER -->
<div class="center">
  <div class="song-bar">
    <h1 id="songTitle">-</h1>
    <div class="artist" id="songArtist"></div>
    <div class="song-meta">
      <span>BPM <span class="v" id="metaBpm">-</span></span>
      <span>STEP <span class="v" id="metaStep">-</span>/<span class="v" id="metaTotal">-</span></span>
    </div>
  </div>
  <div class="ctrls">
    <div class="badges">
      <div class="badge live" id="badgeLive"><div class="pulse"></div>LIVE</div>
      <div class="badge" id="badgeQlc">QLC+ &#x25CF;</div>
      <div class="badge off" style="font-size:8px;letter-spacing:1px">v2026.03.26m</div>
    </div>
    <div class="beat-area">
      <div class="beat-row">
        <div class="tap-btn" id="tap">1<span class="tap-label">TAP</span></div>
        <div class="beat-connector" id="conn1"></div>
        <div class="beat-dots">
          <div class="bdot" id="b2"></div>
          <div class="bdot" id="b3"></div>
          <div class="bdot" id="b4"></div>
        </div>
      </div>
      <div class="bpm-box"><div class="bpm-num" id="bpmDisp">-</div><div class="bpm-label">BPM</div></div>
    </div>
    <div class="overrides">
      <button class="obtn a" data-accent="blind"><span class="ico">&#x1F4A5;</span>BLINDER</button>
      <button class="obtn a" data-accent="strobe"><span class="ico">&#x26A1;</span>STROBE</button>
      <button class="obtn c" data-accent="fog_5s"><span class="ico">&#x2601;</span>FOG 5s</button>
      <button class="obtn c" data-accent="fog_10s"><span class="ico">&#x2601;</span>FOG 10s</button>
    </div>
    <div class="overrides">
      <button class="obtn r" data-accent="blackout"><span class="ico">&#x25A0;</span>BLACK</button>
      <button class="obtn a" data-accent="alarm"><span class="ico">&#x1F514;</span>ALARM</button>
      <button class="obtn c" data-accent="fog_on"><span class="ico">&#x2601;</span>FOG AN</button>
      <button class="obtn r" data-accent="fog_off"><span class="ico">&#x2B1B;</span>FOG AUS</button>
    </div>
    <div class="navrow">
      <button class="nbtn" id="btnPrev">&#x25C0; PREV</button>
      <button class="nbtn go" id="btnNext">NEXT &#x25B6;</button>
    </div>
  </div>
</div>

<!-- RIGHT: SETLIST -->
<div class="panel" style="border-right:none">
  <div class="setlist-head">
    <button class="rec-main-btn" id="btnRec">&#x23FA; REC</button>
    <button class="settings-btn" onclick="toggleConfig()" title="QLC+ Config">&#x2699;</button>
  </div>
  <div class="panel-head" style="border-top:1px solid var(--border)">SETLIST</div>
  <div class="scroll" id="setlist"></div>
</div>

</div>

<!-- BOTTOM: TIMELINE -->
<div class="timeline" id="timeline">
  <div class="tl-label">
    <span class="tl-part-name" id="tlPart">-</span>
    <span class="tl-part-count" id="tlCount">-</span>
  </div>
  <div class="tl-track"><div class="tl-scroll" id="tlScroll"><div class="tl-bars" id="tlBars"></div><div class="tl-lyrics" id="tlLyrics"></div></div></div>
  <div class="tl-right" style="position:relative">
    <div class="tl-status"><div class="dot" id="dotQlc"></div><span id="statusQlc">QLC+ —</span></div>
    <div class="tl-status"><div class="dot" id="dotSync"></div><span id="statusSync">DB —</span></div>
    <div class="tl-status tl-audio-row" id="audioStatusRow" onclick="toggleVuPanel()">
      <div class="dot" id="dotAudio"></div><span id="statusAudio">XR18 —</span>
    </div>
    <button class="tl-sync" id="btnSync">SYNC</button>
    <div class="tl-rec-dur" id="recDurInline"></div>
    <div class="vu-panel" id="vuPanel">
      <div class="vu-head">
        <span>XR18 Pegel</span>
        <span class="vu-device" id="vuDevice">—</span>
      </div>
      <div class="vu-channels" id="vuChannels"></div>
    </div>
  </div>
</div>

</div>

<script>

// ═══════════════════════════════════════════════
// lighting.ai Live Controller
// Reference-UI Layout + Server Connectivity
// ═══════════════════════════════════════════════

var state = {};
var setlist = [];
var songs = {};
var qlcMapping = {};
var songBars = [];   // bars grouped by part for current song
var lastBarsSongId = null;
var ws = null;
var wsReady = false;
var reconnTimer = null;
var beat = 1;
var beatTimer = null;

// ─── WebSocket ────────────────────────────────
function connectWS() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var url = proto + '//' + location.host + '/ws';
  ws = new WebSocket(url);
  ws.onopen = function() {
    wsReady = true;
    setTask('ct-ws', 'done');
    setTimeout(dismissOverlay, 300);
    if (reconnTimer) { clearTimeout(reconnTimer); reconnTimer = null; }
  };
  ws.onmessage = function(e) {
    var msg = JSON.parse(e.data);
    if (msg.type === 'state') {
      state = msg.data;
      renderAll();
    }
  };
  ws.onclose = function() {
    wsReady = false;
    // Show overlay again on disconnect with reconnect status
    var ov = document.getElementById('connOverlay');
    setTask('ct-songs', 'done');
    setTask('ct-setlist', 'done');
    setTask('ct-qlc', 'done');
    setTask('ct-ws', 'active');
    ov.classList.remove('fade');
    ov.classList.add('show');
    reconnTimer = setTimeout(connectWS, 2000);
  };
  ws.onerror = function() { ws.close(); };
}

function sendCmd(action, params) {
  if (!ws || !wsReady) return;
  ws.send(JSON.stringify(Object.assign({ action: action }, params || {})));
}

// ─── REST API ─────────────────────────────────
function fetchJSON(url) {
  return fetch(url).then(function(r) { return r.json(); });
}

async function loadInitialData() {
  try {
    var results = await Promise.all([
      fetchJSON('/api/songs'),
      fetchJSON('/api/setlist'),
      fetchJSON('/api/qlc/mapping'),
    ]);
    songs = results[0];
    setlist = results[1].items || [];
    qlcMapping = results[2].song_mapping || {};
    renderAll();
  } catch (e) {
    console.error('Failed to load initial data:', e);
  }
}

// ─── Bars loader ─────────────────────────────
async function loadBarsForSong(songId) {
  if (!songId || songId === lastBarsSongId) return;
  try {
    songBars = await fetchJSON('/api/songs/' + encodeURIComponent(songId) + '/bars');
    lastBarsSongId = songId;
  } catch (e) {
    songBars = [];
    lastBarsSongId = null;
  }
}

// ─── Helpers ──────────────────────────────────
// Scrollt ein Element innerhalb seines Containers sichtbar —
// ohne den Viewport / die ganze Seite zu scrollen.
function scrollIntoContainer(container, el) {
  var elTop = el.offsetTop;
  var elBottom = elTop + el.offsetHeight;
  var ctTop = container.scrollTop;
  var ctBottom = ctTop + container.clientHeight;
  if (elTop < ctTop) {
    container.scrollTop = elTop - 6;
  } else if (elBottom > ctBottom) {
    container.scrollTop = elBottom - container.clientHeight + 6;
  }
}
function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatSyncTime(iso) {
  try {
    var d = new Date(iso);
    var diffMin = Math.round((new Date() - d) / 60000);
    if (diffMin < 1) return 'gerade eben';
    if (diffMin < 60) return 'vor ' + diffMin + 'min';
    var diffH = Math.round(diffMin / 60);
    if (diffH < 24) return 'vor ' + diffH + 'h';
    return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
  } catch (e) { return ''; }
}

// ─── Render: Setlist (right panel) ────────────
function renderSetlist() {
  var el = document.getElementById('setlist');
  var h = '';
  var idx = 0;
  for (var i = 0; i < setlist.length; i++) {
    var item = setlist[i];
    if (item.type === 'pause') {
      h += '<div class="song-pause"></div>';
      continue;
    }
    idx++;
    var sid = item.song_id;
    var isActive = state.current_song_id === sid;
    var hasChaser = !!qlcMapping[sid];
    var cls = isActive ? 'active' : '';
    if (!hasChaser) cls += ' no-chaser';
    var title = hasChaser ? '' : ' title="Kein QLC+ Mapping"';
    h += '<div class="song ' + cls + '" data-sid="' + sid + '"' + title + '>';
    h += '<span class="song-i">' + String(idx).padStart(2, '0') + '</span>';
    h += '<span class="song-t">' + escHtml(item.name || '?') + '</span>';
    h += '<span class="song-b">' + (item.bpm || '') + '</span>';
    h += '</div>';
  }
  el.innerHTML = h;
  var active = el.querySelector('.song.active');
  if (active) scrollIntoContainer(el, active);
}

// ─── Render: Parts (left panel) ───────────────
function renderParts() {
  var el = document.getElementById('parts');
  var sid = state.current_song_id;
  var hasMap = !!qlcMapping[sid];
  if (!sid || !hasMap) {
    el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--t3)">Kein Song ausgew\u00e4hlt</div>';
    return;
  }
  var chaser = qlcMapping[sid];
  var steps = chaser.steps || [];
  var curStep = state.current_step || 0;
  var h = '';
  for (var i = 0; i < steps.length; i++) {
    var s = steps[i];
    var cls = '';
    if (s.is_title) cls = 'done';
    else if (i < curStep) cls = 'done';
    else if (i === curStep) cls = 'active';
    else if (i === curStep + 1) cls = 'next';

    var holdLabel = '';
    if (s.is_manual) holdLabel = 'MANUAL';
    else if (s.hold_sec !== null && s.hold_sec !== undefined) holdLabel = s.hold_sec + 's';

    var name = s.note || s.function_name || '\u2014';
    var info = (s.note && s.function_name) ? s.function_name : '';

    h += '<div class="part ' + cls + '" style="min-height:42px" data-step="' + i + '">';
    h += '<span class="part-n">' + (i + 1) + '</span>';
    h += '<div class="part-body"><span class="part-name">' + escHtml(name) + '</span>';
    if (info) h += '<span class="part-info">' + escHtml(info) + '</span>';
    h += '</div>';
    h += '<span class="part-badge">' + holdLabel + '</span>';
    h += '</div>';
  }
  el.innerHTML = h;
  var active = el.querySelector('.part.active');
  if (active) scrollIntoContainer(el, active);
}

// ─── Render: Timeline (bottom) ────────────────
function truncLyrics(s, max) {
  if (!s) return '';
  if (s.length <= max) return s;
  return s.substring(0, max - 1) + '\u2026';
}

function renderTimeline() {
  var sid = state.current_song_id;
  var partName = state.current_part_name || state.current_function_name || '-';
  var curStep = state.current_step || 0;
  var totalSteps = state.total_steps || 0;

  document.getElementById('tlPart').textContent = partName;
  document.getElementById('tlCount').textContent = totalSteps > 0
    ? 'Step ' + (curStep + 1) + ' / ' + totalSteps : '-';

  // Determine which part name is currently active (from chaser step note)
  var activePartName = '';
  if (sid && qlcMapping[sid]) {
    var steps = qlcMapping[sid].steps || [];
    if (steps[curStep]) {
      activePartName = (steps[curStep].note || '').toLowerCase();
    }
  }

  // Bar blocks in timeline — bars on top, lyrics below (both scroll together)
  var bh = '';
  var lh = '';
  var activePartIdx = -1;
  if (sid && songBars.length > 0) {
    for (var pi = 0; pi < songBars.length; pi++) {
      if (activePartName && songBars[pi].part_name.toLowerCase() === activePartName) {
        activePartIdx = pi;
        break;
      }
    }
    for (var p = 0; p < songBars.length; p++) {
      var part = songBars[p];
      var isActivePart = p === activePartIdx;
      var bars = part.bars;
      var count = part.bar_count || bars.length;
      for (var b = 0; b < count; b++) {
        var barData = bars[b] || null;
        var lyrics = barData ? barData.lyrics : '';
        var cls = isActivePart ? 'active' : (activePartIdx >= 0 && p < activePartIdx ? 'done' : '');
        var style = b === 0 ? ' style="border-left:2px solid ' + (isActivePart ? 'var(--green)' : 'var(--border2)') + '"' : '';
        var barNum = b + 1;
        bh += '<div class="tl-bar ' + cls + '" title="' + escHtml(part.part_name) + ' T' + barNum + '"' + style + '>' + barNum + '</div>';
        lh += '<div class="tl-lyric">' + (lyrics ? escHtml(truncLyrics(lyrics, 14)) : '') + '</div>';
      }
    }
  } else if (sid) {
    bh += '<div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--amber);padding:0 4px;align-self:center">Keine Takte — SYNC dr\u00fccken</div>';
  }
  document.getElementById('tlBars').innerHTML = bh;
  document.getElementById('tlLyrics').innerHTML = lh;

  // Scroll active bar into view — scroll the wrapper so bars + lyrics move together
  var tlScrollEl = document.getElementById('tlScroll');
  var activeBar = document.querySelector('#tlBars .tl-bar.active');
  if (activeBar && tlScrollEl) {
    var barLeft = activeBar.offsetLeft;
    var barRight = barLeft + activeBar.offsetWidth;
    var visible = tlScrollEl.scrollLeft;
    var visEnd = visible + tlScrollEl.clientWidth;
    if (barLeft < visible || barRight > visEnd) {
      tlScrollEl.scrollLeft = barLeft - tlScrollEl.clientWidth / 2 + activeBar.offsetWidth / 2;
    }
  }

  // QLC+ status
  var dotQlc = document.getElementById('dotQlc');
  var statusQlc = document.getElementById('statusQlc');
  var badgeQlc = document.getElementById('badgeQlc');
  if (state.qlc_connected) {
    dotQlc.className = 'dot ok';
    statusQlc.textContent = 'QLC+ OK';
    badgeQlc.className = 'badge qlc';
  } else {
    dotQlc.className = 'dot err';
    statusQlc.textContent = 'QLC+ \u2014';
    badgeQlc.className = 'badge off';
  }

  // DB sync status
  var dotSync = document.getElementById('dotSync');
  var statusSync = document.getElementById('statusSync');
  if (state.db_synced) {
    var method = state.db_sync_method || '';
    var ts = state.db_sync_time ? formatSyncTime(state.db_sync_time) : '';
    if (method === 'local') {
      dotSync.className = 'dot warn';
      statusSync.textContent = 'DB lokal' + (ts ? ' ' + ts : '');
    } else {
      dotSync.className = 'dot ok';
      statusSync.textContent = 'DB \u2191GH' + (ts ? ' ' + ts : '');
    }
  } else {
    dotSync.className = 'dot warn';
    statusSync.textContent = 'DB Offline';
  }
}

// ─── Render: Full update ──────────────────────
function renderAll() {
  // Song header
  document.getElementById('songTitle').textContent = state.current_song_name || '-';
  document.getElementById('songArtist').textContent = state.current_artist || '';
  document.getElementById('metaBpm').textContent = state.current_bpm || '-';
  document.getElementById('metaStep').textContent = state.current_step != null ? state.current_step + 1 : '-';
  document.getElementById('metaTotal').textContent = state.total_steps || '-';
  document.getElementById('bpmDisp').textContent = state.current_bpm || '-';

  // Start beat sim if we have BPM
  if (state.current_bpm && state.current_bpm > 0) {
    restartBeatSim(state.current_bpm);
  }

  renderSetlist();
  renderParts();

  // Load bars if song changed, then render timeline
  if (state.current_song_id && state.current_song_id !== lastBarsSongId) {
    loadBarsForSong(state.current_song_id).then(function() { renderTimeline(); });
  } else {
    renderTimeline();
  }
}

// ─── Beat visualization ───────────────────────
function updateBeats() {
  var tap = document.getElementById('tap');
  var conn = document.getElementById('conn1');
  if (beat === 1) {
    tap.classList.add('on');
    conn.classList.add('lit');
  } else {
    tap.classList.remove('on');
    conn.classList.remove('lit');
  }
  for (var i = 2; i <= 4; i++) {
    document.getElementById('b' + i).className = beat >= i ? 'bdot on' : 'bdot';
  }
}

function restartBeatSim(bpm) {
  if (beatTimer) clearInterval(beatTimer);
  if (!bpm || bpm <= 0) return;
  beatTimer = setInterval(function() {
    beat = (beat % 4) + 1;
    updateBeats();
  }, Math.round(60000 / bpm));
}

// ─── Event Handlers ───────────────────────────

// Setlist click
document.getElementById('setlist').addEventListener('click', function(e) {
  var songEl = e.target.closest('.song');
  if (!songEl) return;
  var sid = songEl.dataset.sid;
  if (sid) sendCmd('select_song', { song_id: sid });
});

// Parts click
document.getElementById('parts').addEventListener('click', function(e) {
  var partEl = e.target.closest('.part');
  if (!partEl) return;
  var idx = parseInt(partEl.dataset.step, 10);
  if (!isNaN(idx)) sendCmd('goto', { step: idx });
});

// Timeline step click
document.getElementById('tlBars').addEventListener('click', function(e) {
  var barEl = e.target.closest('.tl-bar');
  if (!barEl) return;
  var idx = parseInt(barEl.dataset.step, 10);
  if (!isNaN(idx)) sendCmd('goto', { step: idx });
});

// Nav buttons
document.getElementById('btnNext').addEventListener('click', function() { sendCmd('next'); });
document.getElementById('btnPrev').addEventListener('click', function() { sendCmd('prev'); });

// Accent buttons (overrides)
document.querySelectorAll('.obtn[data-accent]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    sendCmd('accent', { type: this.dataset.accent });
    this.classList.add('on');
    var self = this;
    setTimeout(function() { self.classList.remove('on'); }, 300);
  });
});

// Tap tempo
var tapTimes = [];
var tapEl = document.getElementById('tap');
function onTap() {
  var now = performance.now();
  tapTimes.push(now);
  if (tapTimes.length > 8) tapTimes.shift();
  beat = 1;
  tapEl.classList.remove('flash');
  tapEl.offsetWidth;
  tapEl.classList.add('flash');
  updateBeats();
  sendCmd('tap');
  // BPM from tap intervals (tap = downbeat, so interval = 4 beats)
  if (tapTimes.length >= 2) {
    var iv = [];
    for (var i = 1; i < tapTimes.length; i++) iv.push(tapTimes[i] - tapTimes[i - 1]);
    if (iv[iv.length - 1] > 4000) { tapTimes = [now]; }
    else {
      var avg = iv.reduce(function(a, b) { return a + b; }, 0) / iv.length;
      var bpm = Math.round(240000 / avg);
      if (bpm >= 40 && bpm <= 220) {
        document.getElementById('bpmDisp').textContent = bpm;
        restartBeatSim(bpm);
      }
    }
  }
}
tapEl.addEventListener('touchstart', function(e) { e.preventDefault(); onTap(); }, { passive: false });
tapEl.addEventListener('mousedown', function(e) { e.preventDefault(); onTap(); });

// Sync button
document.getElementById('btnSync').addEventListener('click', async function() {
  this.textContent = 'SYNC...';
  try {
    var result = await fetch('/api/sync', { method: 'POST' }).then(function(r) { return r.json(); });
    this.textContent = result.ok ? 'OK' : 'FAIL';
    await loadInitialData();
    renderAll();
  } catch (e) {
    this.textContent = 'ERR';
  }
  var self = this;
  setTimeout(function() { self.textContent = 'SYNC'; }, 3000);
});

// Mode toggle (visual only)
function modeSwitch(el) {
  var bs = document.querySelectorAll('.mbtn');

function renderCfgButtons() {
  var container = document.getElementById('cfgGroups');
  var html = '';
  for (var group in CFG_BUTTONS) {
    html += '<div class="cfg-group"><div class="cfg-group-title">' + escHtml(group) + '</div><div class="cfg-btns">';
    var btns = CFG_BUTTONS[group];
    for (var i = 0; i < btns.length; i++) {
      var b = btns[i];
      html += '<div class="cfg-btn" data-ch="' + b[0] + '" onclick="cfgTrigger(this,' + b[0] + ')">';
      html += '<span class="lbl">' + escHtml(b[1]) + '</span>';
      html += '<span class="ch">CH ' + b[0] + '</span>';
      html += '</div>';
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
}

function toggleConfig() {
  var el = document.getElementById('cfgOverlay');
  var show = !el.classList.contains('show');
  el.classList.toggle('show');
  if (show) {
    renderCfgButtons();
    cfgCheckConn();
  }
}

async function cfgTrigger(el, channel) {
  var host = document.getElementById('oscHost').value;
  var port = parseInt(document.getElementById('oscPort').value, 10);
  var uni = parseInt(document.getElementById('oscUni').value, 10);
  el.classList.add('flash');
  setTimeout(function() { el.classList.remove('flash'); }, 400);
  try {
    var resp = await fetch('/api/osc/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ host: host, port: port, universe: uni, collection_id: channel })
    });
    var data = await resp.json();
    showToast(data.ok ? 'CH ' + channel + ' gesendet' : 'Fehler: ' + (data.error || '?'));
  } catch (e) { showToast('Server nicht erreichbar'); }
}

async function cfgCheckConn() {
  var el = document.getElementById('cfgConnStatus');
  try {
    var data = await fetchJSON('/api/qlc/status');
    if (data.connected) {
      el.textContent = 'OSC OK';
      el.className = 'cfg-status ok';
    } else {
      el.textContent = 'OSC nicht verbunden';
      el.className = 'cfg-status err';
    }
  } catch (e) {
    el.textContent = 'Server offline';
    el.className = 'cfg-status err';
  }
}

var toastTimer = null;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2000);
}

// ─── Warmup Task UI ──────────────────────────
function setTask(id, status) {
  var el = document.getElementById(id);
  if (!el) return;
  el.className = 'conn-task ' + status;
  var icon = el.querySelector('.ct-icon');
  if (status === 'active') icon.innerHTML = '&#x25CF;';
  else if (status === 'done') icon.innerHTML = '&#x2714;';
  else if (status === 'err') icon.innerHTML = '&#x2716;';
}

function dismissOverlay() {
  var ov = document.getElementById('connOverlay');
  ov.classList.add('fade');
  setTimeout(function() { ov.classList.remove('show', 'fade'); }, 400);
}

// ─── XR18 / Audio Status ──────────────────────
var vuVisible = false;
var audioLevelsTimer = null;
var lastDeviceName = '';

function toggleVuPanel() {
  vuVisible = !vuVisible;
  document.getElementById('vuPanel').classList.toggle('show', vuVisible);
  if (vuVisible) pollAudioLevels();
}

// Schließen wenn außerhalb geklickt
document.addEventListener('click', function(e) {
  if (!vuVisible) return;
  var row = document.getElementById('audioStatusRow');
  var panel = document.getElementById('vuPanel');
  if (!row.contains(e.target) && !panel.contains(e.target)) {
    vuVisible = false;
    panel.classList.remove('show');
  }
});

async function pollAudioLevels() {
  try {
    var data = await fetchJSON('/api/audio/levels');
    var devData = await fetchJSON('/api/audio/devices');
    updateAudioStatus(data, devData);
  } catch (e) {
    document.getElementById('dotAudio').className = 'dot err';
    document.getElementById('statusAudio').textContent = 'Audio —';
  }
}

function updateAudioStatus(levelsData, devData) {
  var dot = document.getElementById('dotAudio');
  var label = document.getElementById('statusAudio');
  var channels = levelsData.channels || [];
  var active = levelsData.stream_active;

  // XR18 erkannt?
  var xr18ok = devData && devData.xr18_detected;
  var devName = (devData && devData.xr18_candidates && devData.xr18_candidates[0])
    ? devData.xr18_candidates[0].name : (devData && devData.devices && devData.devices[0] ? devData.devices[0].name : '');
  if (devName !== lastDeviceName) {
    document.getElementById('vuDevice').textContent = devName || '—';
    lastDeviceName = devName;
  }

  // Signal auf Mix-Kanälen (CH17+18, Index 16+17)?
  var mixRms = 0;
  if (channels.length >= 18) {
    mixRms = Math.max(channels[16].rms || 0, channels[17].rms || 0);
  } else if (channels.length > 0) {
    mixRms = Math.max.apply(null, channels.map(function(c) { return c.rms || 0; }));
  }

  if (!active) {
    dot.className = 'dot err';
    label.textContent = xr18ok ? 'XR18 kein Stream' : 'XR18 —';
  } else if (mixRms < 0.0001) {
    dot.className = 'dot warn';
    label.textContent = 'XR18 Stille';
  } else {
    dot.className = 'dot audio-ok';
    label.textContent = 'XR18 OK';
  }

  // VU-Balken rendern
  if (vuVisible) renderVuBars(channels);
}

function renderVuBars(channels) {
  var container = document.getElementById('vuChannels');
  if (!channels.length) { container.innerHTML = '<span style="color:var(--t4);font-size:10px">Kein Signal</span>'; return; }
  var h = '';
  for (var i = 0; i < channels.length; i++) {
    var ch = channels[i];
    var dbfs = ch.dbfs;
    var isMix = i >= 16;
    // Höhe: -60dBFS = 0%, 0dBFS = 100%
    var pct = dbfs === null ? 0 : Math.max(0, Math.min(100, (dbfs + 60) / 60 * 100));
    var fillCls = pct > 15 ? '' : 'low';
    h += '<div class="vu-ch' + (isMix ? ' mix' : '') + '">';
    h += '<div class="vu-bar-wrap"><div class="vu-bar-fill ' + fillCls + '" style="height:' + pct.toFixed(1) + '%"></div></div>';
    h += '<span class="vu-lbl">' + (i + 1) + '</span>';
    h += '</div>';
  }
  container.innerHTML = h;
}

// Polling alle 3s im Hintergrund (nur Dot-Update, kein VU)
function startAudioPolling() {
  pollAudioLevels();
  audioLevelsTimer = setInterval(function() {
    fetchJSON('/api/audio/levels').then(function(d) {
      fetchJSON('/api/audio/devices').then(function(dd) {
        updateAudioStatus(d, dd);
      }).catch(function(){});
    }).catch(function() {
      document.getElementById('dotAudio').className = 'dot err';
      document.getElementById('statusAudio').textContent = 'Audio —';
    });
  }, 3000);
}

// ─── Recording UI ─────────────────────────────
var recRunning = false;
var recDurTimer = null;
var recStartedAt = null;
var recStopArmed = false;
var recStopArmTimer = null;
var recLongPressTimer = null;

(function initRecBtn() {
  var btn = document.getElementById('btnRec');

  // Touch: Langdruck = Nachbereitung, kurzer Tap = Start/Stop
  btn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    recLongPressTimer = setTimeout(function() {
      recLongPressTimer = null;
      if (!recRunning) openRecPostModal();
    }, 600);
  }, { passive: false });

  btn.addEventListener('touchend', function(e) {
    e.preventDefault();
    if (recLongPressTimer) {
      clearTimeout(recLongPressTimer);
      recLongPressTimer = null;
      recTap();
    }
  });

  // Maus (Desktop): Langdruck per mousedown/mouseup
  btn.addEventListener('mousedown', function() {
    recLongPressTimer = setTimeout(function() {
      recLongPressTimer = null;
      if (!recRunning) openRecPostModal();
    }, 600);
  });
  btn.addEventListener('mouseup', function() {
    if (recLongPressTimer) {
      clearTimeout(recLongPressTimer);
      recLongPressTimer = null;
      recTap();
    }
  });
  btn.addEventListener('mouseleave', function() {
    if (recLongPressTimer) { clearTimeout(recLongPressTimer); recLongPressTimer = null; }
  });
})();

function recTap() {
  if (!recRunning) {
    recStart();
  } else if (!recStopArmed) {
    // Erster Tap: Stopp-Bestätigung anfordern
    recStopArmed = true;
    var btn = document.getElementById('btnRec');
    btn.classList.remove('on');
    btn.classList.add('armed');
    btn.textContent = 'STOPP?';
    recStopArmTimer = setTimeout(function() {
      recStopArmed = false;
      btn.classList.remove('armed');
      btn.classList.add('on');
      btn.textContent = 'REC';
    }, 3000);
  } else {
    // Zweiter Tap: wirklich stoppen
    clearTimeout(recStopArmTimer);
    recStopArmed = false;
    recStop();
  }
}

async function recStart() {
  var now = new Date();
  var label = 'Probe ' + now.getFullYear() + '-'
    + String(now.getMonth()+1).padStart(2,'0') + '-'
    + String(now.getDate()).padStart(2,'0');
  try {
    await fetch('/api/recording/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ label: label, song_id: '' })
    });
    recRunning = true;
    recStartedAt = now;
    startRecDurTimer();
    var btn = document.getElementById('btnRec');
    btn.classList.add('on');
    btn.textContent = 'REC';
    showToast('Aufnahme gestartet');
  } catch (e) { showToast('Fehler beim Starten'); }
}

async function recStop() {
  try {
    var res = await fetch('/api/recording/stop', { method: 'POST' });
    var data = await res.json();
    recRunning = false;
    stopRecDurTimer();
    var btn = document.getElementById('btnRec');
    btn.classList.remove('on', 'armed');
    btn.textContent = 'REC';
    var info = data.path ? data.path.split('/').pop() : '';
    showToast('Aufnahme gespeichert' + (info ? ': ' + info : ''));
  } catch (e) { showToast('Fehler beim Stoppen'); }
}

function startRecDurTimer() {
  if (recDurTimer) return;
  var el = document.getElementById('recDurInline');
  el.classList.add('show');
  recDurTimer = setInterval(function() {
    if (!recStartedAt) return;
    var sec = Math.floor((Date.now() - recStartedAt.getTime()) / 1000);
    var m = Math.floor(sec / 60), s = sec % 60;
    el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }, 1000);
}

function stopRecDurTimer() {
  if (recDurTimer) { clearInterval(recDurTimer); recDurTimer = null; }
  var el = document.getElementById('recDurInline');
  el.classList.remove('show');
  el.textContent = '';
}

async function refreshRecStatus() {
  try {
    var s = await fetchJSON('/api/recording/status');
    recRunning = s.running;
    var btn = document.getElementById('btnRec');
    btn.classList.toggle('on', recRunning);
    if (recRunning && s.started_at) {
      recStartedAt = new Date(s.started_at);
      startRecDurTimer();
    }
  } catch (e) { /* Server offline */ }
}

// ─── Nachbereitung Modal (Langdruck auf REC) ──
function openRecPostModal() {
  var el = document.getElementById('recOverlay');
  el.classList.add('show');
  loadRecList();
}

function toggleRecModal() {
  var el = document.getElementById('recOverlay');
  el.classList.remove('show');
}

async function loadRecList() {
  try {
    var data = await fetchJSON('/api/recording/list');
    renderRecList(data.recordings || []);
  } catch (e) {
    document.getElementById('recList').innerHTML = '<div class="rec-empty">Server nicht erreichbar</div>';
  }
}

function renderRecList(recs) {
  var el = document.getElementById('recList');
  if (!recs.length) { el.innerHTML = '<div class="rec-empty">Keine Aufnahmen</div>'; return; }
  var h = '';
  for (var i = 0; i < recs.length; i++) {
    var r = recs[i];
    var isMix = r.filename.indexOf('_mixdown') !== -1;
    h += '<div class="rec-item" id="ri-' + i + '">';
    h += '<span class="rec-item-name" title="' + escHtml(r.filename) + '">' + escHtml(r.filename) + '</span>';
    h += '<span class="rec-item-meta">' + r.size_mb + ' MB</span>';
    if (!isMix) {
      h += '<button class="rec-mix-btn" onclick="recMixdown(' + i + ',\'' + escHtml(r.filename) + '\')">MIXDOWN</button>';
    } else {
      h += '<span class="rec-item-meta" style="color:var(--green)">&#x2714; Mix</span>';
    }
    h += '</div>';
  }
  el.innerHTML = h;
}

async function recMixdown(idx, filename) {
  var btn = document.querySelector('#ri-' + idx + ' .rec-mix-btn');
  if (btn) { btn.textContent = '...'; btn.disabled = true; }
  try {
    var res = await fetch('/api/recording/mixdown', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename: filename })
    });
    var data = await res.json();
    if (data.error) {
      showToast('Fehler: ' + data.error);
      if (btn) { btn.textContent = 'MIXDOWN'; btn.disabled = false; }
    } else {
      showToast('Mixdown: ' + data.filename + ' (' + data.size_mb + ' MB)');
      if (btn) { btn.textContent = 'OK'; btn.classList.add('done'); }
      await loadRecList();
    }
  } catch (e) {
    showToast('Server nicht erreichbar');
    if (btn) { btn.textContent = 'MIXDOWN'; btn.disabled = false; }
  }
}

  // Step 3: QLC+ Mapping
  setTask('ct-qlc', 'active');

  // Render what we have so far

  setTask('ct-ws', 'active');
  connectWS();
  // WS onopen will mark done and dismiss overlay

  // Step 5: Audio polling + Recording-Status
  startAudioPolling();
  refreshRecStatus();
})();
