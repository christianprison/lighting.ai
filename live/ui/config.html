<title>lighting.ai — QLC+ Config</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#08090d;--bg2:#0e1017;--bg3:#151820;--bg4:#1c1f2b;
--border:#1e2230;--border2:#2a2e40;
--t1:#eef0f6;--t2:#a0a4b8;--t3:#5c6080;--t4:#363a52;
--green:#00dc82;--green2:#00dc8230;--green3:#00dc8212;
--red:#ff3b5c;--amber:#f0a030;--cyan:#38bdf8;
--r:8px}
html,body{min-height:100vh;background:var(--bg);color:var(--t1);
font-family:'Sora',system-ui,sans-serif;font-size:14px}

.header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;background:var(--bg2)}
.header h1{font-size:18px;font-weight:600}
.header a{color:var(--t3);text-decoration:none;font-size:12px;font-family:'DM Mono',monospace}
.header a:hover{color:var(--t1)}

.osc-cfg{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:var(--bg2)}
.osc-cfg label{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);display:flex;align-items:center;gap:6px}
.osc-cfg input{background:var(--bg3);border:1px solid var(--border2);color:var(--t1);padding:5px 10px;border-radius:4px;
font-family:'DM Mono',monospace;font-size:12px;width:120px}
.osc-cfg input[type=number]{width:70px}
.status{font-family:'DM Mono',monospace;font-size:11px;padding:4px 10px;border-radius:12px;margin-left:auto}
.status.ok{background:var(--green3);color:var(--green);border:1px solid var(--green)}
.status.err{background:#ff3b5c15;color:var(--red);border:1px solid var(--red)}

.info{padding:12px 24px;font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);border-bottom:1px solid var(--border);line-height:1.6}

.groups{padding:16px 24px}
.group{margin-bottom:24px}
.group-title{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;
color:var(--t3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.btns{display:flex;flex-wrap:wrap;gap:8px}

.btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
width:120px;height:80px;border-radius:var(--r);border:1.5px solid var(--border2);background:var(--bg3);
cursor:pointer;transition:all .12s;position:relative;overflow:hidden}
.btn:hover{border-color:var(--t3);background:var(--bg4)}
.btn:active{transform:scale(.95)}
.btn.flash{border-color:var(--green);background:var(--green3);box-shadow:0 0 20px #00dc8220}
.btn-label{font-size:11px;font-weight:500;text-align:center;padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.btn-ch{font-family:'DM Mono',monospace;font-size:9px;color:var(--t4)}
.btn.flash .btn-ch{color:var(--green)}
.btn-id{position:absolute;top:3px;right:5px;font-family:'DM Mono',monospace;font-size:8px;color:var(--t4)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--green);
color:var(--green);padding:8px 20px;border-radius:20px;font-family:'DM Mono',monospace;font-size:12px;
opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <h1>QLC+ OSC Config</h1>
  <a href="/">&#x2190; Live UI</a>
</div>

<div class="osc-cfg">
  <label>Host <input type="text" id="oscHost" value="127.0.0.1"></label>
  <label>Port <input type="number" id="oscPort" value="7700"></label>
  <label>Universe <input type="number" id="oscUni" value="1"></label>
  <div class="status" id="connStatus">...</div>
</div>

<div class="info">
  Workflow: QLC+ &rarr; Button ausw&auml;hlen &rarr; External Input &rarr; Auto-Detect &rarr; hier den Button klicken.<br>
  Jeder Button sendet einen OSC-Trigger auf dem angegebenen Channel. QLC+ erkennt ihn automatisch.
</div>

<div class="groups" id="groups"></div>
<div class="toast" id="toast"></div>

// ─── Render ──────────────────────────────────
function render() {
  var container = document.getElementById('groups');
  var html = '';
  for (var group in BUTTONS) {
    html += '<div class="group">';
    html += '<div class="group-title">' + escHtml(group) + '</div>';
    html += '<div class="btns">';
    var btns = BUTTONS[group];
    for (var i = 0; i < btns.length; i++) {
      var b = btns[i];
      html += '<div class="btn" data-ch="' + b[0] + '" onclick="triggerBtn(this,' + b[0] + ',\'' + escAttr(b[1]) + '\')">';
      html += '<span class="btn-id">B' + b[2] + '</span>';
      html += '<span class="btn-label">' + escHtml(b[1]) + '</span>';
      html += '<span class="btn-ch">CH ' + b[0] + '</span>';
      html += '</div>';
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
}

function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

// ─── OSC Trigger ─────────────────────────────
async function triggerBtn(el, channel, label) {
  var host = document.getElementById('oscHost').value;
  var port = parseInt(document.getElementById('oscPort').value, 10);
  var uni = parseInt(document.getElementById('oscUni').value, 10);

  el.classList.add('flash');
  setTimeout(function() { el.classList.remove('flash'); }, 400);

  try {
    var resp = await fetch('/api/osc/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        host: host,
        port: port,
        universe: uni,
        collection_id: channel,
      }),
    });
    var data = await resp.json();
    if (data.ok) {
      showToast('CH ' + channel + ' gesendet: ' + label);
    } else {
      showToast('Fehler: ' + (data.error || 'unbekannt'));
    }
  } catch (e) {
    showToast('Server nicht erreichbar');
  }
}

// ─── Connection check ────────────────────────
async function checkConnection() {
  var el = document.getElementById('connStatus');
  try {
    var resp = await fetch('/api/qlc/status');
    var data = await resp.json();
    if (data.connected) {
      el.textContent = 'OSC OK (' + data.host + ':' + data.port + ')';
      el.className = 'status ok';
    } else {
      el.textContent = 'OSC nicht verbunden';
      el.className = 'status err';
    }
  } catch (e) {
    el.textContent = 'Server offline';
    el.className = 'status err';
  }
}

// ─── Toast ───────────────────────────────────
var toastTimer = null;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2000);
}

// ─── Init ────────────────────────────────────
render();
checkConnection();
setInterval(checkConnection, 10000);
</script>
