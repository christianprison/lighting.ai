name: Replace Main with Source Branch

on:
  push:
    branches:
      - claude/db-pflege-app-lyrics-drag-0b8up

jobs:
  replace:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout source branch (claude/db-pflege-app-lyrics-drag-0b8up)
        uses: actions/checkout@v3
        with:
          ref: claude/db-pflege-app-lyrics-drag-0b8up

      - name: Force push to main
        run: |
          git branch -M main  # Umbenennen zum Ziel-Branch
          git push origin main --force  # Erzwingt Überschreibung des Ziel-Branches

      - name: Delete source branch
        run: git push origin --delete claude/db-pflege-app-lyrics-drag-0b8up
