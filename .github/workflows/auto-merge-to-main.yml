name: Auto-PR und Merge nach Main

on:
  push:
    branches-ignore:
      - main

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR erstellen (falls noch nicht vorhanden)
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"

          # Prüfen ob PR bereits existiert
          EXISTING=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING existiert bereits"
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Auto-Merge: $BRANCH → main" \
              --body "Automatisch erstellt durch GitHub Action bei Push auf \`$BRANCH\`.")
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "PR #$PR_NUMBER erstellt: $PR_URL"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: PR mergen (mit Warten auf Mergebarkeit + Retry)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.create-pr.outputs.pr_number }}"
          # GitHub berechnet die Mergebarkeit asynchron — direkt nach dem PR-Erstellen
          # ist sie oft noch "UNKNOWN" und der Merge schlaegt fehl (PR bleibt offen
          # haengen). Daher: bis zu 8x mit 8s Pause versuchen.
          for i in $(seq 1 8); do
            if gh pr merge "$PR" --merge --delete-branch --admin; then
              echo "PR #$PR gemergt (Versuch $i)."
              exit 0
            fi
            echo "Merge noch nicht moeglich (Versuch $i) — warte 8s..."
            sleep 8
          done
          echo "::error::Merge von PR #$PR nach 8 Versuchen fehlgeschlagen."
          exit 1
